{% extends 'base.html' %}

{% load humanize %}
{% load photo_extras %}

{% block title %}
Mapa Kolesi
{% endblock %}

{% block content %}
<style>



.map-search{
    width: calc(100% - 32px);

    background:white;
    padding:15px;
    border-radius:16px;

    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

/* PANEL PO PRAWEJ */

#personPanel {
    height: 700px;
}

.profile-photo {
    width: 100%;
    height: 250px;
    object-fit: cover;
    object-position: center;
    border-radius: 10px;
}

.profile-content {
    padding-top: 10px;
}
.salary-box{
    background:#f8f9fa;
    border-radius:12px;
    padding:15px;
    margin-top:15px;
    margin-bottom:15px;
}

.salary-label{
    color:#6c757d;
    font-size:14px;
}

.salary-value{
    font-size:26px;
    font-weight:700;
    color:#198754;
}

    .person-modal{
    display:none;

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.6);

    z-index:9999;
}

.person-modal-content{

    width:90%;
    max-width:1400px;

    height:90vh;

    margin:3vh auto;

    background:white;

    border-radius:20px;

    overflow-y:auto;

    position:relative;

    padding:40px;
}

    .map-search{
    max-width: 900px;
    margin: 20px auto 40px auto;
}

.map-search input{
    height: 56px;
    font-size: 1.1rem;
}

.mapa-title{
    font-size: 1.4rem;
    font-weight: 600;
    color: #495057;
    letter-spacing: .3px;
    margin: 0;
    padding: 16px 16px 0;
}

@media (max-width: 768px) {
    #map {
        height: 400px !important;
    }
}

.mobile-marker-popup {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: white;
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -6px 25px rgba(0,0,0,.2);
    padding: 20px;
    z-index: 2000;
    transform: translateY(120%);
    transition: transform .25s ease;
}

.mobile-marker-popup.show {
    transform: translateY(0);
}

.mobile-marker-popup-close {
    position: absolute;
    top: 6px;
    right: 12px;
    border: none;
    background: none;
    font-size: 1.8rem;
    line-height: 1;
    color: #888;
}

.mobile-marker-photo {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    object-fit: cover;
    background: #f1f1f1;
    flex-shrink: 0;
}



</style>



<link
rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>


<div class="container-fluid p-0">

    <h1 class="mapa-title">
        Mapa Kolesi
    </h1>

    <link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <div class="map-search">

    <input
        type="text"
        id="personSearch"
        class="form-control"
        placeholder="Szukaj osoby, miasta, stanowiska...">

</div>

<div class="row mt-4 mx-0">

    <div class="col-lg-8">

        <div id="map"
             style="height:700px;">
        </div>

    </div>

    <div class="col-lg-4 d-none d-lg-block">

        <div id="personPanel"
             class="card shadow-sm h-100">

            <div class="card-body">

                <h4>
                    👈 Wybierz osobę na mapie
                </h4>

                <p class="text-muted">
                    Kliknij pinezkę aby zobaczyć szczegóły.
                </p>

            </div>

        </div>

    </div>

</div>

<div id="mobileMarkerPopup" class="mobile-marker-popup d-lg-none">

    <button type="button"
            class="mobile-marker-popup-close"
            onclick="closeMobileMarkerPopup()">
        &times;
    </button>

    <div class="d-flex align-items-center gap-3">

        <img id="mobileMarkerPhoto"
             class="mobile-marker-photo"
             src=""
             alt="">

        <div class="flex-grow-1">
            <div id="mobileMarkerName" class="fw-bold fs-5"></div>
        </div>

    </div>

    <button class="btn btn-danger w-100 mt-3" id="mobileMarkerProfileBtn">
        Zobacz profil
    </button>

</div>



    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>



    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>




<script>

var map = L.map('map').setView(
    [52.237, 21.017],
    6
);

L.tileLayer(
    'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        maxZoom: 19
    }
).addTo(map);

var markers = [];
var clusterGroup = L.markerClusterGroup();

{% for person in people %}

const marker{{ person.id }} = L.marker([
    {{ person.latitude }},
    {{ person.longitude }}
]);


marker{{ person.id }}.on('click', function() {

    document.getElementById('personPanel').innerHTML = `

        <div class="card-body d-flex flex-column h-100">

            {% if person.photo %}
                <img
                    src="{{ person.photo|face_crop:'400x250' }}"
                    class="profile-photo">
            {% else %}
                <div class="profile-photo d-flex align-items-center justify-content-center bg-light">
                    <h1>👤</h1>
                </div>
            {% endif %}


            <div class="profile-content">

                <h3 class="mt-3 mb-2">
                    {{ person.first_name }}
                    {{ person.last_name }}
                </h3>


<!--      BAGDE PARTYJNY   -->
                {% if person.current_party %}
                        <div class="mb-3">
    <span class="badge rounded-pill bg-danger">
        {{ person.current_party }}
    </span>
                <div class="mb-2">
                    💼 {{ person.position }}
                </div>

                <div class="mb-2">
                    🏢 {{ person.organization }}
                </div>

                <div class="mb-2">
                    📍 {{ person.city }}
                </div>

               <div class="salary-box">
    <div class="salary-label">
        Roczne wynagrodzenie
    </div>

    <div class="salary-value">
        {{ person.salary_display }}
    </div>
</div>


</div>


{% endif %}

            </div>

            <button
    class="btn btn-danger w-100 mt-auto"
    onclick="openPersonModal({{ person.id }})">

    Zobacz profil

</button>

        </div>

    `;

    document.getElementById('mobileMarkerName').textContent =
        "{{ person.first_name }} {{ person.last_name }}";

    const mobilePhoto = document.getElementById('mobileMarkerPhoto');
    {% if person.photo %}
        mobilePhoto.src = "{{ person.photo|face_crop:'150x150' }}";
        mobilePhoto.style.display = "block";
    {% else %}
        mobilePhoto.style.display = "none";
    {% endif %}

    document.getElementById('mobileMarkerProfileBtn').onclick = function() {
        closeMobileMarkerPopup();
        openPersonModal({{ person.id }});
    };

    document.getElementById('mobileMarkerPopup').classList.add('show');

});

clusterGroup.addLayer(marker{{ person.id }});

markers.push({
    marker: marker{{ person.id }},
    name: "{{ person.first_name }} {{ person.last_name }}",
    city: "{{ person.city }}",
    position: "{{ person.position }}",
    organization: "{{ person.organization }}"
});

{% endfor %}

map.addLayer(clusterGroup);

document
.getElementById('personSearch')
.addEventListener('input', function() {

    const query = this.value.toLowerCase();

    clusterGroup.clearLayers();

    markers.forEach(item => {

        const searchableText = (
            item.name + ' ' +
            item.city + ' ' +
            item.position + ' ' +
            item.organization
        ).toLowerCase();

        if (searchableText.includes(query)) {
            clusterGroup.addLayer(item.marker);
        }

    });


});

    function closeMobileMarkerPopup() {
        document.getElementById('mobileMarkerPopup').classList.remove('show');
    }

    function openPersonModal(personId) {

    fetch(`/osoba/${personId}/`, {
        headers: {
            "X-Requested-With": "XMLHttpRequest"
        }
    })
    .then(response => response.text())
    .then(html => {

        document.getElementById(
            "personModalBody"
        ).innerHTML = html;

        const modal = new bootstrap.Modal(
            document.getElementById("personModal")
        );

        modal.show();

    });

}



window.vote = function(personId, value) {

    fetch(`/vote/${personId}/${value}/`)
    .then(response => {

        if (response.status === 403) {

            alert(
                "Musisz się zalogować, aby głosować."
            );

            window.location.href = "/logowanie/";

            return null;
        }

        return response.json();

    })
    .then(data => {

        console.log("DATA =", data);

        if (!data) return;

        document.getElementById("upvotes").textContent =
            data.upvotes;

        document.getElementById("downvotes").textContent =
            data.downvotes;

        document.getElementById("approval").textContent =
            data.approval + "% poparcia";

        document.getElementById("vote-message").style.display =
            "block";

    })
    .catch(error => {
        console.log(error);
    });

};


</script>

    {% include "components/person_modal.html" %}
</div>

{% endblock %}
